name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Add 404.html for SPA routing
        run: |
          # GitHub Pages serves 404.html on unknown paths.
          # This script redirects to index.html while preserving the path in the hash,
          # so TanStack Router can pick it up on the client side.
          cat > dist/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8" />
              <title>Abaad Murtaza — Portfolio</title>
              <script>
                // Redirect to base path, encoding current path as query param
                // so the SPA can restore it after load.
                var seg = window.location.pathname
                  .replace('/abaad-murtaza', '')
                  .replace(/^\//, '');
                window.location.replace(
                  '/abaad-murtaza/' + (seg ? '?p=/' + seg : '') + window.location.hash
                );
              </script>
            </head>
            <body></body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4