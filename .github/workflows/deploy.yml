name: Deploy TanStack Start app to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install
      
      # Build the TanStack Start app
      - run: npm run build
      
      # Copy client build to root for GitHub Pages
      - name: Prepare GitHub Pages build
        run: |
          mkdir -p pages-build
          cp -r dist/client/* pages-build/
          cp -r dist/client/. pages-build/
          
          # Create a simple 404.html that redirects to index.html for SPA routing
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Redirecting...</title><script>location.href = "/" + location.hash.slice(1) || "/";</script></head><body></body></html>' > pages-build/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages-build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4